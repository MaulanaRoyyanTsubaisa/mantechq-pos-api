<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>KasirFlow - POS Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Custom tailwind config overrides -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#6366f1",
              secondary: "#8b5cf6",
              accent: "#06b6d4",
              soft: "#f9fafb",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gradient-to-br from-slate-50 to-indigo-50/30">
    <div class="flex flex-col h-screen">
      <!-- Header Premium -->
      <header
        class="bg-white/80 backdrop-blur-md shadow-sm border-b border-white/20 px-6 py-4 flex justify-between items-center sticky top-0 z-10"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg"
          >
            <i class="fas fa-cash-register text-white text-xl"></i>
          </div>
          <div>
            <h1
              class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
            >
              Kasir<span class="text-indigo-600">Flow</span>
            </h1>
            <p class="text-xs text-gray-500 -mt-0.5">Point of Sale System</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div
            class="flex items-center gap-2 bg-gray-100 px-4 py-2 rounded-full"
          >
            <i class="fas fa-store text-indigo-500 text-sm"></i>
            <span class="text-sm text-gray-700 font-medium">Toko Bahagia</span>
          </div>
          <button
            id="resetBtn"
            class="group relative overflow-hidden bg-gradient-to-r from-red-500 to-rose-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-md hover:shadow-lg transition-all duration-300"
          >
            <span class="relative z-10 flex items-center gap-1"
              ><i class="fas fa-sync-alt text-xs"></i> Reset</span
            >
          </button>
        </div>
      </header>

      <!-- Main Content Area -->
      <div class="flex-1 overflow-hidden p-5 gap-5 flex flex-col lg:flex-row">
        <!-- LEFT PANEL: KERANJANG (Glassmorphism style) -->
        <div
          class="lg:w-2/5 xl:w-1/3 bg-white/60 backdrop-blur-sm rounded-2xl shadow-xl flex flex-col overflow-hidden border border-white/50"
        >
          <div class="bg-gradient-to-r from-indigo-600 to-indigo-700 px-5 py-4">
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-2 text-white">
                <i class="fas fa-shopping-bag text-xl"></i>
                <h2 class="font-semibold text-lg">Keranjang Belanja</h2>
              </div>
              <div class="bg-white/20 backdrop-blur rounded-full px-3 py-1">
                <span id="cartCount" class="text-white font-bold text-sm"
                  >0</span
                >
                <span class="text-white/80 text-xs ml-1">item</span>
              </div>
            </div>
          </div>

          <div
            id="cartItemsContainer"
            class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"
          >
            <div class="text-center text-gray-400 py-16">
              <i class="fas fa-hand-peace text-5xl mb-3 opacity-50"></i>
              <p class="text-sm">Keranjang masih kosong</p>
              <p class="text-xs mt-1">Klik produk untuk mulai berbelanja</p>
            </div>
          </div>

          <div class="border-t border-gray-200/50 bg-white/90 p-5 space-y-3">
            <div class="flex justify-between items-end">
              <span class="text-gray-500 text-sm">Total Belanja</span>
              <div class="text-right">
                <span
                  id="totalPrice"
                  class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
                  >Rp 0</span
                >
              </div>
            </div>
            <div class="flex gap-3">
              <button
                id="checkoutBtn"
                class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-semibold py-3 rounded-xl transition-all duration-300 shadow-md hover:shadow-lg flex items-center justify-center gap-2"
              >
                <i class="fas fa-credit-card"></i> Bayar Sekarang
              </button>
              <button
                id="clearCartBtn"
                class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-3 px-5 rounded-xl transition-all duration-200"
              >
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- RIGHT PANEL: PRODUK -->
        <div
          class="flex-1 bg-white/60 backdrop-blur-sm rounded-2xl shadow-xl flex flex-col overflow-hidden border border-white/50"
        >
          <div
            class="bg-white/40 px-5 py-3 border-b border-gray-200/50 flex flex-wrap justify-between items-center gap-3"
          >
            <div class="flex items-center gap-2">
              <i class="fas fa-cube text-indigo-500 text-xl"></i>
              <h2 class="font-semibold text-gray-700">Katalog Produk</h2>
            </div>
            <div class="flex gap-2">
              <div class="relative">
                <i
                  class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"
                ></i>
                <input
                  type="text"
                  id="searchProduct"
                  placeholder="Cari produk..."
                  class="pl-8 pr-3 py-2 border border-gray-200 rounded-xl text-sm w-48 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80"
                />
              </div>
              <button
                id="openModalBtn"
                class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-md hover:shadow-lg transition-all flex items-center gap-1"
              >
                <i class="fas fa-plus-circle"></i> Tambah
              </button>
            </div>
          </div>
          <div
            id="productsGrid"
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4 p-5 overflow-y-auto custom-scroll"
          >
            <!-- Product cards will be injected here -->
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL TAMBAH PRODUK -->
    <div
      id="productModal"
      class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-all duration-300"
    >
      <div
        class="bg-white rounded-2xl w-full max-w-md mx-4 shadow-2xl transform transition-all scale-95 animate-fadeIn"
      >
        <div
          class="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-t-2xl px-6 py-4 flex justify-between items-center"
        >
          <h3 class="text-white font-bold text-xl">
            <i class="fas fa-box-open mr-2"></i>Tambah Produk Baru
          </h3>
          <button
            id="closeModalBtn"
            class="text-white/80 hover:text-white text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nama Produk</label
            >
            <input
              type="text"
              id="modalProductName"
              placeholder="Contoh: Kopi Kapal Api"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Harga (Rp)</label
            >
            <input
              type="number"
              id="modalProductPrice"
              placeholder="5000"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
          </div>
          <div class="flex gap-3 pt-2">
            <button
              id="confirmAddProductBtn"
              class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition"
            >
              Tambah Produk
            </button>
            <button
              id="cancelModalBtn"
              class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition"
            >
              Batal
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
